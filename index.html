<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToDoアプリ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-wrapper">

    <header class="app-header">
      <div class="header-top">
        <span class="header-label">MY TASKS</span>
        <span class="task-count" id="taskCount">0 件</span>
      </div>
      <h1 class="app-title">今日やること</h1>
    </header>

    <div class="input-area">
      <input
        type="text"
        id="taskInput"
        class="task-input"
        placeholder="新しいタスクを入力..."
        maxlength="80"
        autocomplete="off"
      />
      <button class="add-btn" id="addBtn" aria-label="タスクを追加">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="active">未完了</button>
      <button class="filter-btn" data-filter="done">完了済み</button>
    </div>

    <ul class="task-list" id="taskList">
      <!-- タスクはJSで描画 -->
    </ul>

    <div class="empty-state" id="emptyState">
      <p class="empty-icon">✦</p>
      <p class="empty-text">タスクがありません</p>
      <p class="empty-sub">上のフォームから追加してみましょう</p>
    </div>

    <footer class="app-footer">
      <button class="clear-btn" id="clearDoneBtn">完了済みを削除</button>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
